kind = "web"
previewPath = "/trust-wallet/"
title = "Trust Wallet Clone"
version = "1.0.0"
id = "artifacts/trust-wallet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/trust-wallet/" ]
localPort = 23773

[services.development]
run = "pnpm --filter @workspace/trust-wallet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trust-wallet", "run", "build" ]
publicDir = "artifacts/trust-wallet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23773"
BASE_PATH = "/trust-wallet/"
